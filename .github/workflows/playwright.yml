name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run smoke tests nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_env:
        description: 'Test environment'
        required: false
        default: 'dev'
        type: choice
        options: [dev, staging]
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options: [all, smoke, linkedin, search]

env:
  TEST_ENV: ${{ github.event.inputs.test_env || 'dev' }}
  CI: 'true'
  HEADLESS: 'true'

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npx playwright test tests/smoke/ --project=chromium-no-auth
        env:
          BASE_URL: https://www.linkedin.com

      - name: Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  full-suite:
    name: Full LinkedIn Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: smoke
    if: github.event_name != 'pull_request' || github.event.inputs.test_suite == 'all'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create auth directory
        run: mkdir -p reports/auth

      - name: Run auth setup
        run: npx playwright test --project=setup
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          BASE_URL: https://www.linkedin.com

      - name: Run LinkedIn search tests
        run: npx playwright test tests/linkedin/ --project=chromium
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          BASE_URL: https://www.linkedin.com

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload PDF reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-reports
          path: reports/pdf/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: reports/screenshots/
          retention-days: 14
